<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#0b7983"/>
  <!-- Speedometer arc -->
  <path d="M7 20a9 9 0 0 1 18 0" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tick marks on arc -->
  <line x1="8.5" y1="15" x2="9.5" y2="16" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="12" x2="12" y2="13" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="11" x2="16" y2="12.2" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="12" x2="20" y2="13" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23.5" y1="15" x2="22.5" y2="16" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Needle pointing to high -->
  <line x1="16" y1="20" x2="21" y2="13" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="20" r="2" fill="#FFFFFF"/>
  <!-- Quote marks -->
  <text x="13" y="27" font-family="Georgia,serif" font-weight="700" font-size="7" fill="#FFFFFF">&quot;&quot;</text>
</svg>
